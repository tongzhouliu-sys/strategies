<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 迷失于星际</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;900&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #03060f;
      --deep: #060d1f;
      --aurora-1: #00d4ff;
      --aurora-2: #7b2fff;
      --aurora-3: #ff4ecb;
      --text-main: #e8eaf6;
      --text-dim: rgba(232,234,246,0.4);
      --glow: rgba(0, 212, 255, 0.15);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--void);
      color: var(--text-main);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── STAR FIELD ── */
    canvas#stars {
      position: fixed; inset: 0; z-index: 0;
    }

    /* ── AURORA RING ── */
    .aurora {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 520px; height: 520px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%, var(--aurora-2) 20%,
        transparent 35%, var(--aurora-1) 55%,
        transparent 70%, var(--aurora-3) 88%,
        transparent 100%
      );
      filter: blur(48px);
      opacity: 0.18;
      animation: spin 18s linear infinite;
      z-index: 1;
    }

    .aurora-inner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,0,0,1) 35%, rgba(7, 2, 30, 0.9) 65%, transparent 100%);
      z-index: 2;
    }

    /* ── ORBIT RING ── */
    .orbit-ring {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotateX(72deg);
      width: 460px; height: 460px;
      border-radius: 50%;
      border: 1px solid rgba(0, 212, 255, 0.18);
      z-index: 3;
      animation: orbit-pulse 4s ease-in-out infinite;
    }
    .orbit-ring::before {
      content: '';
      position: absolute;
      top: -3px; left: 50%;
      width: 6px; height: 6px;
      background: var(--aurora-1);
      border-radius: 50%;
      box-shadow: 0 0 12px 4px var(--aurora-1);
      animation: orbit-dot 8s linear infinite;
      transform-origin: -230px 0;
    }
    .orbit-ring-2 {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotateX(72deg) rotateZ(60deg);
      width: 380px; height: 380px;
      border-radius: 50%;
      border: 1px solid rgba(123, 47, 255, 0.15);
      z-index: 3;
    }
    .orbit-ring-2::before {
      content: '';
      position: absolute;
      top: -2px; left: 50%;
      width: 4px; height: 4px;
      background: var(--aurora-3);
      border-radius: 50%;
      box-shadow: 0 0 10px 3px var(--aurora-3);
      animation: orbit-dot 5s linear infinite reverse;
      transform-origin: -190px 0;
    }

    /* ── MAIN CONTENT ── */
    .scene {
      position: fixed; inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .label-top {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: var(--aurora-1);
      text-transform: uppercase;
      opacity: 0;
      animation: fade-up 1s ease forwards 0.4s;
      margin-bottom: 20px;
    }

    .number-404 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(120px, 22vw, 220px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.04em;
      background: linear-gradient(
        135deg,
        rgba(232,234,246,0.95) 0%,
        rgba(0, 212, 255, 0.9) 40%,
        rgba(123, 47, 255, 0.85) 70%,
        rgba(255, 78, 203, 0.8) 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.3));
      opacity: 0;
      animation: fade-up 1s ease forwards 0.1s, flicker 8s ease-in-out infinite 2s;
    }

    .divider {
      width: 120px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--aurora-1), var(--aurora-2), transparent);
      margin: 28px 0 26px;
      opacity: 0;
      animation: fade-in 1.2s ease forwards 0.7s;
    }

    .msg-cn {
      font-family: 'Playfair Display', serif;
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 400;
      color: var(--text-main);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fade-up 1s ease forwards 0.9s;
    }

    .msg-en {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 10px;
      opacity: 0;
      animation: fade-up 1s ease forwards 1.1s;
    }

    .cta-row {
      display: flex;
      gap: 16px;
      margin-top: 44px;
      opacity: 0;
      animation: fade-up 1s ease forwards 1.4s;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: transparent;
      color: var(--aurora-1);
      border: 1px solid rgba(0, 212, 255, 0.5);
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--aurora-1);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
      z-index: -1;
    }
    .btn-primary:hover {
      color: var(--void);
      border-color: var(--aurora-1);
    }
    .btn-primary:hover::before { transform: scaleX(1); }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid rgba(232,234,246,0.12);
    }
    .btn-ghost:hover {
      color: var(--text-main);
      border-color: rgba(232,234,246,0.35);
    }

    /* ── ERROR CODE TICKER ── */
    .ticker {
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: rgba(0, 212, 255, 0.35);
      z-index: 10;
      white-space: nowrap;
      opacity: 0;
      animation: fade-in 2s ease forwards 2s;
    }

    .ticker span {
      animation: ticker-blink 1.4s step-end infinite;
    }

    /* ── SCAN LINE ── */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 20;
    }

    /* ── CORNER DECORATION ── */
    .corner {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 15;
      opacity: 0;
      animation: fade-in 1.5s ease forwards 1.8s;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--aurora-1);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: 28px; left: 28px; }
    .corner.tr { top: 28px; right: 28px; transform: scaleX(-1); }
    .corner.bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
    .corner.br { bottom: 28px; right: 28px; transform: scale(-1); }

    /* ── KEYFRAMES ── */
    @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
    @keyframes orbit-dot { to { transform: rotate(360deg) translateX(230px); } }
    @keyframes orbit-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes flicker {
      0%, 97%, 100% { filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.3)); }
      98% { filter: drop-shadow(0 0 60px rgba(0, 212, 255, 0.7)) brightness(1.1); }
      99% { filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.2)) brightness(0.95); }
    }
    @keyframes ticker-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <canvas id="stars"></canvas>
  <div class="aurora"></div>
  <div class="aurora-inner"></div>
  <div class="orbit-ring"></div>
  <div class="orbit-ring-2"></div>
  <div class="scanlines"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <main class="scene">
    <p class="label-top">HTTP / STATUS CODE</p>
    <h1 class="number-404">404</h1>
    <div class="divider"></div>
    <p class="msg-cn">你所寻找的页面已消失于星际之间</p>
    <p class="msg-en">The page you seek has drifted into the void</p>
    <div class="cta-row">
      <a class="btn btn-primary" href="/">返回主页</a>
      <a class="btn btn-ghost" href="javascript:history.back()">后退</a>
    </div>
  </main>

  <p class="ticker">ERR_PAGE_NOT_FOUND &nbsp;·&nbsp; COORD: 00.000°N 00.000°E &nbsp;·&nbsp; <span>_</span></p>

  <script>
    /* ── Star field canvas ── */
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');

    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initStars(n = 280) {
      stars = [];
      for (let i = 0; i < n; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.4 + 0.2,
          alpha: Math.random() * 0.7 + 0.2,
          speed: Math.random() * 0.015 + 0.004,
          phase: Math.random() * Math.PI * 2,
          color: ['#ffffff','#aadeff','#d0aaff','#ffcce8'][Math.floor(Math.random()*4)]
        });
      }
    }

    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.01;
      const cx = W / 2, cy = H / 2;

      stars.forEach(s => {
        // subtle parallax drift toward center
        const dx = cx - s.x, dy = cy - s.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const pull = Math.min(0.008, 60 / (dist * dist + 1));
        s.x += dx * pull;
        s.y += dy * pull;

        // respawn at edge when too close to center
        if (dist < 18) {
          s.x = Math.random() < 0.5 ? Math.random() * 60 : W - Math.random() * 60;
          s.y = Math.random() < 0.5 ? Math.random() * 60 : H - Math.random() * 60;
        }

        const twinkle = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
        ctx.globalAlpha = twinkle;
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }

    resize();
    initStars();
    draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
  </script>
</body>
</html>
